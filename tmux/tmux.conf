# ---- Prefix key ----
unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix

# ---- Config Reload ----
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# ---- Colors ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---- Title ----
set -g set-titles on
set -g set-titles-string "#T"

# ---- Window indexing ----
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g allow-rename on

# ---- Key + Mouse ----
set -g mouse on
set -sg escape-time 10 # remove delay for exiting insert mode with ESC in Neovim
set-window-option -g mode-keys vi
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

# ---- Window creating and navigation ----
unbind Space
bind Space last-window

bind c new-window -c "#{pane_current_path}" # Use current not session path

bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"

bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"

bind -r C-j resize-pane -D 15
bind -r C-k resize-pane -U 15
bind -r C-h resize-pane -L 15
bind -r C-l resize-pane -R 15

bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1
bind \` switch-client -t'{marked}' # Can mark a window with Prefix + m

# ---- Plugins ----
set -g @plugin 'tmux-plugins/tpm'

# sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# theming (if moved below sesssion management then it will override continuum's ability to insert a hidden script into the status bar which is used to trigger and track session saves)
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @catppuccin_flavour 'mocha' # latte or frappe, macchiato, mocha

# utils
set -g @plugin 'tmux-plugins/tmux-yank'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---- Visual Tweaks ----
# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# session management
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @continuum-restore 'on'

set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
